# Mobile is its own pnpm scope, isolated from the main workspace.
# Reason: Expo 54 + React Native 0.81 + React 19.1 conflict with React 18
# pinned by apps/web. Running this as a separate scope avoids hoist conflicts.
packages: []
overrides:
  expo-auth-session: ~7.0.11
  expo-crypto: ~15.0.9
  expo-application: ~7.0.8
  expo-web-browser: ~15.0.11
  react: 19.1.0
  react-dom: 19.1.0
peerDependencyRules:
  allowedVersions:
    react: 19.1.0
    react-dom: 19.1.0
onlyBuiltDependencies:
  - unrs-resolver
